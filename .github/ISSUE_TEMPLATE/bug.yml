name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What went wrong, and what impact did it have?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal steps, expected behaviour, and actual behaviour.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Kaffenol version, operating system, and relevant image properties without sharing private images.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: How could a fix be demonstrated?
