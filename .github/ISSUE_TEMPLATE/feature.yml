name: Feature request
description: Propose a testable user-facing outcome
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What difficulty should Kaffenol solve?
    validations:
      required: true
  - type: textarea
    id: behaviour
    attributes:
      label: Expected behaviour
      description: What should become possible?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: State what is included and deliberately excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable, testable outcomes.
    validations:
      required: true
